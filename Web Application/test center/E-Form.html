<!DOCTYPE html>
<html lang="en">
  <head>
    <title>E-Form - Test Center</title>
    <meta name="description" content="E-Form search interface for HN/EN lookup with personal details management.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://fonts.googleapis.com/css?family=Open+Sans:400,300,300italic,400italic,600' rel='stylesheet' type='text/css'>
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700" rel="stylesheet">
    
    <style>
html, body {
min-height: 100%;
}
body, div, form, input, select, p { 
padding: 0;
margin: 0;
outline: none;
font-family: Roboto, Arial, sans-serif;
font-size: 14px;
color: #666;
}
h1 {
margin: 0;
font-weight: 400;
}
h3 {
margin: 12px 0;
color: #8ebf42;
}
.main-block {
display: flex;
justify-content: center;
align-items: center;
background: #fff;
}
form {
width: 100%;
padding: 20px;
}
fieldset {
border: none;
border-top: 1px solid #8ebf42;
}
.account-details, .personal-details {
display: flex;
flex-wrap: wrap;
justify-content: space-between;
}
.account-details >div, .personal-details >div >div {
display: flex;
align-items: center;
margin-bottom: 10px;
}
.account-details >div, .personal-details >div, input, label {
width: 100%;
}
label {
padding: 0 5px;
text-align: right;
vertical-align: middle;
}
input {
padding: 5px;
vertical-align: middle;
}
.checkbox {
margin-bottom: 10px;
}
select, .children, .gender, .bdate-block {
width: calc(100% + 26px);
padding: 5px 0;
}
select {
background: transparent;
}
.gender input {
width: auto;
} 
.gender label {
padding: 0 5px 0 0;
} 
.bdate-block {
display: flex;
justify-content: space-between;
}
.birthdate select.day {
width: 35px;
}
.birthdate select.month {
width: calc(100% - 94px);
}
.birthdate input {
width: 38px;
vertical-align: unset;
}
.checkbox input, .children input {
width: auto;
margin: -2px 10px 0 0;
}
.checkbox a {
color: #8ebf42;
}
.checkbox a:hover {
color: #82b534;
}
button {
width: 100%;
padding: 10px 0;
margin: 10px auto;
border-radius: 5px; 
border: none;
background: #8ebf42; 
font-size: 14px;
font-weight: 600;
color: #fff;
}
button:hover {
background: #82b534;
}
@media (min-width: 568px) {
.account-details >div, .personal-details >div {
width: 50%;
}
label {
width: 40%;
}
input {
width: 60%;
}
select, .children, .gender, .bdate-block {
width: calc(60% + 16px);
}
}
    </style>

  </head>
    
<body>
  <div class="main-block">
    <form action="/">
      <h1>Search HN</h1>
      <fieldset>
        <legend>
          <h3>Account Details</h3>
        </legend>
        <div class="account-details">
          <div>
            <label for="hn">HN*</label>
            <input type="text" id="hn" name="hn" required>
          </div>
          <div>
            <label for="en">EN*</label>
            <input type="password" id="en" name="en" required>
          </div>
        </div>
      </fieldset>

      <!--  Personal Details   -->
      <fieldset>
        <legend>
          <h3>Personal Details</h3>
        </legend>

        <div class="personal-details">
          <div>
            <div>
              <label for="fullname">Name*</label>
              <input type="text" id="fullname" name="fullname" required>
            </div>
            <div>
              <label for="phone">Phone*</label>
              <input type="text" id="phone" name="phone" required>
            </div>
            <div>
              <label for="street">Street</label>
              <input type="text" id="street" name="street">
            </div>
            <div>
              <label for="city">City*</label>
              <input type="text" id="city" name="city" required>
            </div>
            <div>
              <label for="country">Country*</label> 
              <select id="country" name="country">
                <option value=""></option>
                <option value="Armenia">Armenia</option>
                <option value="Russia">Russia</option>
                <option value="Germany">Germany</option>
                <option value="France">France</option>
                <option value="USA">USA</option>
                <option value="UK">UK</option>
              </select>
            </div>
            <div>
              <label for="website">Website</label>
              <input type="text" id="website" name="website">
            </div>
          </div>

          <div>
            <div>
              <label>Gender*</label>
              <div class="gender">
                <input type="radio" value="male" id="male" name="gender" required/>
                <label for="male" class="radio">Male</label>
                <input type="radio" value="female" id="female" name="gender" required/>
                <label for="female" class="radio">Female</label>
              </div>
            </div>

            <div class="birthdate">
              <label>Birthdate*</label>
              <div class="bdate-block">
                <select class="day" name="birthday" required>
                  <option value=""></option>
                  <option value="01">01</option>
                  <option value="02">02</option>
                  <option value="03">03</option>
                  <option value="04">04</option>
                  <option value="05">05</option>
                  <option value="06">06</option>
                  <option value="07">07</option>
                  <option value="08">08</option>
                  <option value="09">09</option>
                  <option value="10">10</option>
                  <option value="11">11</option>
                  <option value="12">12</option>
                  <option value="13">13</option>
                  <option value="14">14</option>
                  <option value="15">15</option>
                  <option value="16">16</option>
                  <option value="17">17</option>
                  <option value="18">18</option>
                  <option value="19">19</option>
                  <option value="20">20</option>
                  <option value="21">21</option>
                  <option value="22">22</option>
                  <option value="23">23</option>
                  <option value="24">24</option>
                  <option value="25">25</option>
                  <option value="26">26</option>
                  <option value="27">27</option>
                  <option value="28">28</option>
                  <option value="29">29</option>
                  <option value="30">30</option>
                  <option value="31">31</option>
                </select>

                <select class="month" name="birthmonth" required>
                  <option value=""></option>
                  <option value="January">January</option>
                  <option value="February">February</option>
                  <option value="March">March</option>
                  <option value="April">April</option>
                  <option value="May">May</option>
                  <option value="June">June</option>
                  <option value="July">July</option>
                  <option value="August">August</option>
                  <option value="September">September</option>
                  <option value="October">October</option>
                  <option value="November">November</option>
                  <option value="December">December</option>
                </select>

                <input type="text" id="birthyear" name="birthyear" placeholder="Year" required>
              </div>
            </div>

            <div>
              <label for="nationality">Nationality*</label> 
              <select id="nationality" name="nationality" required>
                <option value=""></option>
                <option value="Armenian">Armenian</option>
                <option value="Russian">Russian</option>
                <option value="German">German</option>
                <option value="French">French</option>
                <option value="American">American</option>
                <option value="English">English</option>
              </select>
            </div>

            <div>
              <label for="hasChildren">Children*</label>
              <div class="children">
                <input type="checkbox" id="hasChildren" name="hasChildren">
              </div>
            </div>
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>
          <h3>Terms and Mailing</h3>
        </legend>
        <div class="terms-mailing">
          <!-- Terms and mailing content here -->
        </div>
      </fieldset>

      <button type="submit">Submit</button>
    </form>
  </div> 
</body>
</html>
