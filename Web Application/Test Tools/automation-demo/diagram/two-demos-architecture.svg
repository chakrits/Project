<svg width="680" height="565" viewBox="0 0 680 565" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>Two automation demos sharing one Mock Server</title>
  <desc>Newman drives the API lane and Playwright drives the UI lane through Mini Postman and the CORS proxy; both call the shared Mock Server demo endpoints, and each lane produces its own report.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="680" height="565" fill="#ffffff"/>

  <line x1="190" y1="98" x2="300" y2="300" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="98" x2="490" y2="132" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="180" x2="490" y2="214" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="262" x2="440" y2="300" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="356" x2="340" y2="392" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

  <path d="M90 74 L55 74 L55 504 L90 504" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <path d="M590 74 L625 74 L625 504 L590 504" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <g>
    <rect x="90" y="50" width="200" height="48" rx="4" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
    <text x="190" y="71" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Newman (Postman CLI)</text>
    <text x="190" y="88" text-anchor="middle" font-size="12" fill="#185FA5">API · headless · CI</text>
  </g>

  <g>
    <rect x="390" y="50" width="200" height="48" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
    <text x="490" y="71" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Playwright</text>
    <text x="490" y="88" text-anchor="middle" font-size="12" fill="#534AB7">real browser UI</text>
  </g>
  <g>
    <rect x="390" y="132" width="200" height="48" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
    <text x="490" y="153" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Mini Postman</text>
    <text x="490" y="170" text-anchor="middle" font-size="12" fill="#534AB7">in-app HTTP client</text>
  </g>
  <g>
    <rect x="390" y="214" width="200" height="48" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
    <text x="490" y="235" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">POST /api/proxy</text>
    <text x="490" y="252" text-anchor="middle" font-size="12" fill="#534AB7">CORS proxy</text>
  </g>

  <g>
    <rect x="200" y="300" width="280" height="56" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
    <text x="340" y="325" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Mock Server</text>
    <text x="340" y="343" text-anchor="middle" font-size="12" fill="#0F6E56">/mock-api/demo/*</text>
  </g>
  <g>
    <rect x="200" y="392" width="280" height="56" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
    <text x="340" y="414" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">demo endpoints</text>
    <text x="340" y="430" text-anchor="middle" font-size="12" fill="#0F6E56">login · users · orders</text>
    <text x="340" y="444" text-anchor="middle" font-size="12" fill="#0F6E56">200 · 401 · 400 · latency</text>
  </g>

  <g>
    <rect x="90" y="480" width="200" height="48" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
    <text x="190" y="501" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Newman HTML report</text>
    <text x="190" y="518" text-anchor="middle" font-size="12" fill="#5F5E5A">19 assertions · pass/fail</text>
  </g>
  <g>
    <rect x="390" y="480" width="200" height="48" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
    <text x="490" y="501" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Playwright report</text>
    <text x="490" y="518" text-anchor="middle" font-size="12" fill="#5F5E5A">4 cases · video · trace</text>
  </g>

  <line x1="210" y1="548" x2="240" y2="548" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="248" y="552" font-size="12" fill="#5F5E5A">calls (HTTP)</text>
  <line x1="360" y1="548" x2="390" y2="548" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="398" y="552" font-size="12" fill="#5F5E5A">produces report</text>
</svg>
